<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="GeoBlinker25 — геосигналы и фоновая геолокация">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0a18"/><stop offset="0.55" stop-color="#120e26"/><stop offset="1" stop-color="#07060e"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.34" r="0.78">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.3"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="beacon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.6"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="600" fill="url(#bg)"/>
  <rect width="900" height="600" fill="url(#glow)"/>
  <g stroke="#a78bfa" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 150 H900 M0 300 H900 M0 450 H900"/>
    <path d="M180 0 V600 M360 0 V600 M540 0 V600 M720 0 V600"/>
  </g>

  <!-- beacon with signal arcs -->
  <g transform="translate(650 286)">
    <circle r="150" fill="url(#beacon)" opacity="0.7"/>
    <g fill="none" stroke="url(#stroke)" stroke-linecap="round">
      <path d="M-44 -44 A62 62 0 0 1 44 -44" stroke-width="4" opacity="0.85"/>
      <path d="M44 44 A62 62 0 0 1 -44 44" stroke-width="4" opacity="0.85"/>
      <path d="M-74 -74 A104 104 0 0 1 74 -74" stroke-width="3" opacity="0.4"/>
      <path d="M74 74 A104 104 0 0 1 -74 74" stroke-width="3" opacity="0.4"/>
    </g>
    <circle r="16" fill="rgba(34,211,238,0.18)" stroke="#22d3ee" stroke-width="3.5"/>
    <circle r="5" fill="#22d3ee"/>
  </g>
  <!-- background ping dots -->
  <g>
    <circle cx="470" cy="200" r="5" fill="#a78bfa"/>
    <circle cx="500" cy="380" r="5" fill="#fbbf24"/>
    <circle cx="800" cy="200" r="5" fill="#22d3ee"/>
    <circle cx="820" cy="372" r="5" fill="#a78bfa"/>
  </g>

  <text x="56" y="92" font-family="'Segoe UI',system-ui,sans-serif" font-size="50" font-weight="700" fill="#f4f3fb" letter-spacing="-1">GeoBlinker25</text>
  <text x="58" y="130" font-family="ui-monospace,'IBM Plex Mono',monospace" font-size="18" font-weight="600" fill="#a78bfa" letter-spacing="3">GEO SIGNALS · BACKGROUND</text>

  <g font-family="ui-monospace,'IBM Plex Mono',monospace" fill="#f4f3fb">
    <g transform="translate(56 466)">
      <rect width="180" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">TRACKING</text>
      <text x="20" y="63" font-size="23" font-weight="700">Background</text>
    </g>
    <g transform="translate(256 466)">
      <rect width="150" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">SIGNAL</text>
      <text x="20" y="63" font-size="24" font-weight="700">Geo ping</text>
    </g>
    <g transform="translate(426 466)">
      <rect width="160" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">STAGE</text>
      <text x="20" y="63" font-size="24" font-weight="700">Prototype</text>
    </g>
  </g>
</svg>
