<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="Stefa AI Art — генерация изображений по тексту">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0a18"/><stop offset="0.55" stop-color="#120e26"/><stop offset="1" stop-color="#07060e"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="art" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/><stop offset="0.5" stop-color="#6366f1" stop-opacity="0.4"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.32" r="0.78">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.34"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="600" fill="url(#bg)"/>
  <rect width="900" height="600" fill="url(#glow)"/>
  <g stroke="#a78bfa" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 150 H900 M0 300 H900 M0 450 H900"/>
    <path d="M180 0 V600 M360 0 V600 M540 0 V600 M720 0 V600"/>
  </g>

  <!-- prompt bar -->
  <g transform="translate(470 188)">
    <rect width="270" height="52" rx="26" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.28)"/>
    <circle cx="30" cy="26" r="9" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
    <text x="54" y="33" font-family="ui-monospace,'IBM Plex Mono',monospace" font-size="16" fill="#a5a2c2">a golden lion, neon…</text>
  </g>
  <!-- flow arrow -->
  <path d="M605 252 L605 286" stroke="url(#stroke)" stroke-width="3" stroke-linecap="round"/>
  <path d="M597 278 L605 290 L613 278" fill="none" stroke="url(#stroke)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- generated frame -->
  <g transform="translate(540 300)">
    <rect width="230" height="170" rx="20" fill="url(#art)" stroke="url(#stroke)" stroke-width="2.5"/>
    <g opacity="0.85">
      <path d="M22 132 L78 70 L120 110 L156 78 L208 132 Z" fill="#0c0a18" fill-opacity="0.35"/>
      <circle cx="172" cy="50" r="16" fill="#fbbf24" fill-opacity="0.85"/>
    </g>
  </g>
  <!-- sparkles -->
  <g fill="#fbbf24">
    <path d="M792 196 l6 16 l16 6 l-16 6 l-6 16 l-6 -16 l-16 -6 l16 -6 Z"/>
    <path d="M500 330 l4 11 l11 4 l-11 4 l-4 11 l-4 -11 l-11 -4 l11 -4 Z" fill="#a78bfa"/>
  </g>

  <text x="56" y="92" font-family="'Segoe UI',system-ui,sans-serif" font-size="56" font-weight="700" fill="#f4f3fb" letter-spacing="-1">Stefa AI Art</text>
  <text x="58" y="130" font-family="ui-monospace,'IBM Plex Mono',monospace" font-size="18" font-weight="600" fill="#a78bfa" letter-spacing="3">TEXT-TO-IMAGE GENERATION</text>

  <g font-family="ui-monospace,'IBM Plex Mono',monospace" fill="#f4f3fb">
    <g transform="translate(56 466)">
      <rect width="138" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">ENGINE</text>
      <text x="20" y="63" font-size="26" font-weight="700">AI</text>
    </g>
    <g transform="translate(214 466)">
      <rect width="150" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">SPEED</text>
      <text x="20" y="63" font-size="26" font-weight="700">Seconds</text>
    </g>
    <g transform="translate(384 466)">
      <rect width="190" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">STORE</text>
      <text x="20" y="63" font-size="24" font-weight="700">Google Play</text>
    </g>
  </g>
</svg>
