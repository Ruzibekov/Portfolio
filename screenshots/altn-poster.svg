<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="ALTN Chat — реалтайм-мессенджер с ИИ">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0a18"/><stop offset="0.55" stop-color="#120e26"/><stop offset="1" stop-color="#07060e"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/><stop offset="1" stop-color="#6366f1" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.34" r="0.78">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.32"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="600" fill="url(#bg)"/>
  <rect width="900" height="600" fill="url(#glow)"/>
  <g stroke="#a78bfa" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 150 H900 M0 300 H900 M0 450 H900"/>
    <path d="M180 0 V600 M360 0 V600 M540 0 V600 M720 0 V600"/>
  </g>

  <!-- incoming bubble -->
  <g transform="translate(470 190)">
    <path d="M16 0 H184 a16 16 0 0 1 16 16 V58 a16 16 0 0 1 -16 16 H40 L18 96 V74 H16 A16 16 0 0 1 0 58 V16 A16 16 0 0 1 16 0 Z"
          fill="rgba(167,139,250,0.09)" stroke="rgba(167,139,250,0.3)" stroke-width="2"/>
    <rect x="22" y="24" width="120" height="9" rx="4.5" fill="#a5a2c2"/>
    <rect x="22" y="44" width="80" height="9" rx="4.5" fill="#6f6c8f"/>
  </g>
  <!-- outgoing (AI) bubble -->
  <g transform="translate(560 300)">
    <path d="M16 0 H224 a16 16 0 0 1 16 16 V62 a16 16 0 0 1 -16 16 H40 a16 16 0 0 1 -16 -16 V96 L8 78 H16 A16 16 0 0 1 0 62 V16 A16 16 0 0 1 16 0 Z" transform="translate(0 0)"
          fill="url(#bubble)" stroke="url(#stroke)" stroke-width="2"/>
    <rect x="56" y="22" width="150" height="9" rx="4.5" fill="#f4f3fb" fill-opacity="0.85"/>
    <rect x="56" y="42" width="110" height="9" rx="4.5" fill="#f4f3fb" fill-opacity="0.55"/>
    <!-- AI spark -->
    <path d="M34 40 l6 14 l14 6 l-14 6 l-6 14 l-6 -14 l-14 -6 l14 -6 Z" fill="#fbbf24"/>
  </g>
  <!-- signal waves -->
  <g fill="none" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="2.5" stroke-linecap="round">
    <path d="M806 250 a26 26 0 0 1 0 52"/>
    <path d="M826 234 a48 48 0 0 1 0 84"/>
  </g>

  <text x="56" y="92" font-family="'Segoe UI',system-ui,sans-serif" font-size="56" font-weight="700" fill="#f4f3fb" letter-spacing="-1">ALTN Chat</text>
  <text x="58" y="130" font-family="ui-monospace,'IBM Plex Mono',monospace" font-size="18" font-weight="600" fill="#a78bfa" letter-spacing="3">REALTIME MESSAGING · AI</text>

  <g font-family="ui-monospace,'IBM Plex Mono',monospace" fill="#f4f3fb">
    <g transform="translate(56 466)">
      <rect width="166" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">LATENCY</text>
      <text x="20" y="63" font-size="26" font-weight="700">Realtime</text>
    </g>
    <g transform="translate(242 466)">
      <rect width="140" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">AI</text>
      <text x="20" y="63" font-size="26" font-weight="700">Built-in</text>
    </g>
    <g transform="translate(402 466)">
      <rect width="190" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">STORE</text>
      <text x="20" y="63" font-size="24" font-weight="700">Google Play</text>
    </g>
  </g>
</svg>
