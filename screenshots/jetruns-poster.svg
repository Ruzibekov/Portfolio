    <rect x="-6" y="18" width="66" height="84" rx="26" fill="none" stroke="url(#stroke)" stroke-width="4"/>
    <path d="M6 64 L18 64 L23 52 L31 78 L38 56 L42 64 L48 64" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
