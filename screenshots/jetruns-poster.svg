  <path d="M40 330 L150 330 L185 270 L225 390 L275 190 L320 330 L470 330 L505 270 L545 400 L595 220 L640 330 L860 330"
        fill="none" stroke="url(#stroke)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="595" cy="220" r="6.5" fill="#22d3ee"/>
  <circle cx="595" cy="220" r="13" fill="none" stroke="#22d3ee" stroke-opacity="0.5" stroke-width="2"/>

  <g transform="translate(706 120)">
