<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="WeGoTrip — аудиогиды и туры">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0a18"/><stop offset="0.55" stop-color="#120e26"/><stop offset="1" stop-color="#07060e"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.34" r="0.78">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.26"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="600" fill="url(#bg)"/>
  <rect width="900" height="600" fill="url(#glow)"/>
  <g stroke="#a78bfa" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 150 H900 M0 300 H900 M0 450 H900"/>
    <path d="M180 0 V600 M360 0 V600 M540 0 V600 M720 0 V600"/>
  </g>

  <!-- dashed route across -->
  <path d="M70 380 C200 300 260 420 380 360 C500 300 560 410 700 330 C770 295 820 300 860 286"
        fill="none" stroke="url(#stroke)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="2 14"/>
  <!-- route pins -->
  <g>
    <g transform="translate(70 380)"><path d="M0 -34 C16 -34 26 -22 26 -8 C26 10 0 30 0 30 C0 30 -26 10 -26 -8 C-26 -22 -16 -34 0 -34 Z" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="3"/><circle cx="0" cy="-8" r="7" fill="#22d3ee"/></g>
    <g transform="translate(380 360)"><path d="M0 -30 C14 -30 23 -19 23 -7 C23 9 0 26 0 26 C0 26 -23 9 -23 -7 C-23 -19 -14 -30 0 -30 Z" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="3"/><circle cx="0" cy="-7" r="6" fill="#a78bfa"/></g>
    <g transform="translate(860 286)"><path d="M0 -38 C18 -38 29 -25 29 -9 C29 12 0 34 0 34 C0 34 -29 12 -29 -9 C-29 -25 -18 -38 0 -38 Z" fill="rgba(163,230,53,0.14)" stroke="#a3e635" stroke-width="3.5"/><circle cx="0" cy="-9" r="8" fill="#a3e635"/></g>
  </g>

  <!-- headphones + waveform -->
  <g transform="translate(560 178)">
    <path d="M0 40 a40 40 0 0 1 80 0" fill="none" stroke="url(#stroke)" stroke-width="4" stroke-linecap="round"/>
    <rect x="-8" y="40" width="20" height="34" rx="9" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="3"/>
    <rect x="68" y="40" width="20" height="34" rx="9" fill="rgba(163,230,53,0.15)" stroke="#a3e635" stroke-width="3"/>
  </g>
  <g stroke="#a3e635" stroke-width="4" stroke-linecap="round" opacity="0.85">
    <path d="M672 196 V236"/><path d="M690 184 V248"/><path d="M708 202 V230"/><path d="M726 176 V256"/><path d="M744 198 V234"/>
  </g>

  <text x="56" y="92" font-family="'Segoe UI',system-ui,sans-serif" font-size="56" font-weight="700" fill="#f4f3fb" letter-spacing="-1">WeGoTrip</text>
  <text x="58" y="130" font-family="ui-monospace,'IBM Plex Mono',monospace" font-size="18" font-weight="600" fill="#a78bfa" letter-spacing="3">AUDIO GUIDES · TOURS</text>

  <g font-family="ui-monospace,'IBM Plex Mono',monospace" fill="#f4f3fb">
    <g transform="translate(56 466)">
      <rect width="154" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">PLATFORM</text>
      <text x="20" y="63" font-size="26" font-weight="700">Android</text>
    </g>
    <g transform="translate(230 466)">
      <rect width="160" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">MODE</text>
      <text x="20" y="63" font-size="24" font-weight="700">Audio tour</text>
    </g>
    <g transform="translate(410 466)">
      <rect width="190" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">STORE</text>
      <text x="20" y="63" font-size="24" font-weight="700">Google Play</text>
    </g>
  </g>
</svg>
