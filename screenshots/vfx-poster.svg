<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="VFX Timecode — генератор таймкода">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0a18"/><stop offset="0.55" stop-color="#120e26"/><stop offset="1" stop-color="#07060e"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.34" r="0.78">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.3"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="600" fill="url(#bg)"/>
  <rect width="900" height="600" fill="url(#glow)"/>
  <g stroke="#a78bfa" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 150 H900 M0 300 H900 M0 450 H900"/>
    <path d="M180 0 V600 M360 0 V600 M540 0 V600 M720 0 V600"/>
  </g>

  <!-- film frame with perforations -->
  <g transform="translate(452 196)">
    <rect x="26" y="0" width="356" height="188" rx="16" fill="rgba(12,10,24,0.6)" stroke="rgba(167,139,250,0.3)" stroke-width="2"/>
    <!-- perforations -->
    <g fill="rgba(167,139,250,0.35)">
      <rect x="4" y="14" width="16" height="22" rx="4"/><rect x="4" y="50" width="16" height="22" rx="4"/><rect x="4" y="86" width="16" height="22" rx="4"/><rect x="4" y="122" width="16" height="22" rx="4"/><rect x="4" y="158" width="16" height="22" rx="4"/>
      <rect x="388" y="14" width="16" height="22" rx="4"/><rect x="388" y="50" width="16" height="22" rx="4"/><rect x="388" y="86" width="16" height="22" rx="4"/><rect x="388" y="122" width="16" height="22" rx="4"/><rect x="388" y="158" width="16" height="22" rx="4"/>
    </g>
    <!-- timecode readout -->
    <text x="204" y="86" font-family="ui-monospace,'IBM Plex Mono',monospace" font-size="44" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="2">01:23:45:12</text>
    <text x="204" y="124" font-family="ui-monospace,'IBM Plex Mono',monospace" font-size="16" fill="#a5a2c2" text-anchor="middle" letter-spacing="3">HH : MM : SS : FF</text>
    <!-- fps chip -->
    <g transform="translate(150 142)">
      <rect width="108" height="30" rx="15" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.32)"/>
      <text x="54" y="20" font-family="ui-monospace,'IBM Plex Mono',monospace" font-size="14" font-weight="700" fill="#22d3ee" text-anchor="middle">24 FPS</text>
    </g>
  </g>

  <text x="56" y="92" font-family="'Segoe UI',system-ui,sans-serif" font-size="52" font-weight="700" fill="#f4f3fb" letter-spacing="-1">VFX Timecode</text>
  <text x="58" y="130" font-family="ui-monospace,'IBM Plex Mono',monospace" font-size="18" font-weight="600" fill="#a78bfa" letter-spacing="3">TIMECODE GENERATOR · FPS</text>

  <g font-family="ui-monospace,'IBM Plex Mono',monospace" fill="#f4f3fb">
    <g transform="translate(56 466)">
      <rect width="184" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">STACK</text>
      <text x="20" y="63" font-size="23" font-weight="700">React · Vite</text>
    </g>
    <g transform="translate(260 466)">
      <rect width="128" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">MODE</text>
      <text x="20" y="63" font-size="26" font-weight="700">PWA</text>
    </g>
    <g transform="translate(408 466)">
      <rect width="138" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">STATUS</text>
      <text x="20" y="63" font-size="26" font-weight="700">Live</text>
    </g>
  </g>
</svg>
