<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="My Nail Salon — AI-дизайн ногтей">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0a18"/><stop offset="0.55" stop-color="#120e26"/><stop offset="1" stop-color="#07060e"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f472b6"/><stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.34" r="0.78">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.32"/><stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="600" fill="url(#bg)"/>
  <rect width="900" height="600" fill="url(#glow)"/>
  <g stroke="#a78bfa" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 150 H900 M0 300 H900 M0 450 H900"/>
    <path d="M180 0 V600 M360 0 V600 M540 0 V600 M720 0 V600"/>
  </g>

  <!-- color palette swatches -->
  <g transform="translate(486 188)">
    <rect width="46" height="46" rx="12" fill="#f472b6"/>
    <rect x="58" width="46" height="46" rx="12" fill="#a78bfa"/>
    <rect x="116" width="46" height="46" rx="12" fill="#22d3ee"/>
    <rect x="174" width="46" height="46" rx="12" fill="#fbbf24"/>
    <rect x="232" width="46" height="46" rx="12" fill="rgba(244,114,182,0.25)" stroke="url(#stroke)" stroke-width="2.5"/>
  </g>

  <!-- stylized hand / fingers with painted nails -->
  <g transform="translate(548 280)">
    <g fill="rgba(167,139,250,0.07)" stroke="url(#stroke)" stroke-width="3" stroke-linecap="round">
      <path d="M0 150 V70 a20 20 0 0 1 40 0 V150"/>
      <path d="M48 150 V46 a20 20 0 0 1 40 0 V150"/>
      <path d="M96 150 V58 a20 20 0 0 1 40 0 V150"/>
      <path d="M144 150 V86 a20 20 0 0 1 40 0 V150"/>
    </g>
    <!-- painted nail tips -->
    <g>
      <rect x="2" y="54" width="36" height="26" rx="13" fill="#f472b6"/>
      <rect x="50" y="30" width="36" height="26" rx="13" fill="#a78bfa"/>
      <rect x="98" y="42" width="36" height="26" rx="13" fill="#22d3ee"/>
      <rect x="146" y="70" width="36" height="26" rx="13" fill="#fbbf24"/>
    </g>
  </g>
  <!-- sparkle -->
  <path d="M470 300 l5 14 l14 5 l-14 5 l-5 14 l-5 -14 l-14 -5 l14 -5 Z" fill="#f472b6"/>

  <text x="56" y="92" font-family="'Segoe UI',system-ui,sans-serif" font-size="54" font-weight="700" fill="#f4f3fb" letter-spacing="-1">My Nail Salon</text>
  <text x="58" y="130" font-family="ui-monospace,'IBM Plex Mono',monospace" font-size="18" font-weight="600" fill="#a78bfa" letter-spacing="3">AI NAIL DESIGN STUDIO</text>

  <g font-family="ui-monospace,'IBM Plex Mono',monospace" fill="#f4f3fb">
    <g transform="translate(56 466)">
      <rect width="138" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">DESIGN</text>
      <text x="20" y="63" font-size="26" font-weight="700">AI</text>
    </g>
    <g transform="translate(214 466)">
      <rect width="150" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">PREVIEW</text>
      <text x="20" y="63" font-size="26" font-weight="700">Instant</text>
    </g>
    <g transform="translate(384 466)">
      <rect width="160" height="80" rx="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)"/>
      <text x="20" y="34" font-size="14" fill="#22d3ee">STATUS</text>
      <text x="20" y="63" font-size="24" font-weight="700">Private</text>
    </g>
  </g>
</svg>
