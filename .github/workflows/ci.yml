name: Node CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Just
        uses: taiki-e/install-action@just

      - name: Install
        run: just install

      - name: Verify
        run: just verify
